version: '3.8'

x-db-env: &db-env
  DB_HOST: ${DB_HOST:-timescaledb}
  DB_NAME: ${DB_NAME:-stockdw}
  DB_USER: ${DB_USER:-data226}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}

x-airflow-env: &airflow-env
  <<: *db-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-data226}:${DB_PASSWORD}@${DB_HOST:-timescaledb}:5432/${DB_NAME:-stockdw}
  AIRFLOW_CONN_TIMESCALEDB_CONN: postgresql://${DB_USER:-data226}:${DB_PASSWORD}@${DB_HOST:-timescaledb}:5432/${DB_NAME:-stockdw}
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:?Set AIRFLOW__WEBSERVER__SECRET_KEY in .env}
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:?Set AIRFLOW__CORE__FERNET_KEY in .env}
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  FRED_API_KEY: ${FRED_API_KEY:-}
  EDGAR_IDENTITY: ${EDGAR_IDENTITY:-StockDataPlatform user@example.com}

x-airflow-volumes: &airflow-volumes
  - ./Dags:/opt/airflow/dags
  - ./scripts:/opt/airflow/scripts
  - ./SQL:/opt/airflow/sql
  - ./requirements.txt:/requirements.txt

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-data226}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-stockdw}
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./SQL/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      - timescaledb
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8081:8080"
    command: >
      bash -c "
      airflow db migrate &&
      (airflow users create --username admin --password admin --firstname Air --lastname Flow --role Admin --email admin@example.com || true) &&
      airflow webserver"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - timescaledb
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    command: >
      bash -c "
      airflow db migrate &&
      airflow scheduler"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: stock-data-platform-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: stock-data-platform-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://stock-data-platform-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-producer:
    build:
      context: .
      dockerfile: Dockerfile.kafka
      args:
        SCRIPT: live_from_kafka.py
    container_name: stock-data-platform-kafka-producer
    depends_on:
      - kafka
      - timescaledb
    environment:
      <<: *db-env
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-stock-data-platform-kafka:9092}
      STOCK_TICKERS: ${STOCK_TICKERS:-AAPL,AMZN,DIS,GOOG,JPM,META,MSFT,NFLX,NVDA,TSLA}
    restart: always

  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.kafka
      args:
        SCRIPT: kafka_to_postgres.py
    container_name: stock-data-platform-kafka-consumer
    depends_on:
      - kafka
      - timescaledb
    environment:
      <<: *db-env
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-stock-data-platform-kafka:9092}
    restart: always
